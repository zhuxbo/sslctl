server {
    listen 443 ssl;
    server_name example.com www.example.com;

    ssl_certificate /etc/ssl/certs/example.com.crt;
    ssl_certificate_key /etc/ssl/private/example.com.key;

    root /var/www/html;
    index index.html;
}

server {
    listen 443 ssl;
    server_name test.example.com;

    ssl_certificate /etc/ssl/certs/test.example.com.crt;
    ssl_certificate_key /etc/ssl/private/test.example.com.key;

    root /var/www/test;
}
