services:
  # Ubuntu 22.04 with Nginx
  ubuntu-nginx:
    build:
      context: ./ubuntu
      dockerfile: Dockerfile
    container_name: sslctl-test-ubuntu
    hostname: ubuntu-nginx
    networks:
      - test-net

  # Debian 12 with Nginx
  debian-nginx:
    build:
      context: ./debian
      dockerfile: Dockerfile
    container_name: sslctl-test-debian
    hostname: debian-nginx
    networks:
      - test-net

  # Rocky Linux 9 with Nginx
  rocky-nginx:
    build:
      context: ./rocky
      dockerfile: Dockerfile
    container_name: sslctl-test-rocky
    hostname: rocky-nginx
    networks:
      - test-net

  # Alpine with Nginx
  alpine-nginx:
    build:
      context: ./alpine
      dockerfile: Dockerfile
    container_name: sslctl-test-alpine
    hostname: alpine-nginx
    networks:
      - test-net

  # Ubuntu 22.04 with Apache
  ubuntu-apache:
    build:
      context: ./ubuntu-apache
      dockerfile: Dockerfile
    container_name: sslctl-test-ubuntu-apache
    hostname: ubuntu-apache
    networks:
      - test-net

  # Rocky Linux 9 with Apache (httpd)
  rocky-apache:
    build:
      context: ./rocky-apache
      dockerfile: Dockerfile
    container_name: sslctl-test-rocky-apache
    hostname: rocky-apache
    networks:
      - test-net

  # Alpine with Apache
  alpine-apache:
    build:
      context: ./alpine-apache
      dockerfile: Dockerfile
    container_name: sslctl-test-alpine-apache
    hostname: alpine-apache
    networks:
      - test-net

networks:
  test-net:
    driver: bridge
