name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Run Tests
        run: go test -v ./...

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: .exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          BUILD_TIME=$(date -u '+%Y-%m-%d %H:%M:%S')
          LDFLAGS="-s -w -X 'main.version=${VERSION}' -X 'main.buildTime=${BUILD_TIME}'"

          go build -ldflags "$LDFLAGS" -o sslctl-${{ matrix.suffix }}${{ matrix.ext }} ./cmd

      - name: Compress
        run: |
          gzip -k sslctl-${{ matrix.suffix }}${{ matrix.ext }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.suffix }}
          path: "*.gz"

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Branch
        id: check
        run: |
          TAG_COMMIT=$(git rev-list -n 1 ${{ github.ref_name }})

          if git branch -r --contains $TAG_COMMIT | grep -q 'origin/main'; then
            echo "branch=main" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "branch=dev" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "name=${{ github.ref_name }} (Pre-release)" >> $GITHUB_OUTPUT
          fi

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: binaries-*
          merge-multiple: true

      - name: List Files
        run: ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.check.outputs.name }}
          prerelease: ${{ steps.check.outputs.prerelease == 'true' }}
          body: |
            ## ${{ github.ref_name }}

            ${{ steps.check.outputs.prerelease == 'true' && '> ⚠️ **这是测试版本 (Pre-release)**，可能包含未完成的功能或已知问题。' || '> ✅ **这是正式版本**，已经过测试验证。' }}

            ### 下载

            | 平台 | 文件 |
            |------|------|
            | Linux x64 | sslctl-linux-amd64.gz |
            | Linux ARM64 | sslctl-linux-arm64.gz |
            | Windows x64 | sslctl-windows-amd64.exe.gz |

            ### 使用方法

            ```bash
            # 扫描站点
            sslctl nginx scan
            sslctl apache scan

            # 部署证书
            sslctl nginx deploy --site example.com
            sslctl apache deploy --site example.com

            # 守护进程模式
            sslctl nginx daemon
            sslctl apache daemon

            # 调试模式
            sslctl --debug nginx deploy --site example.com
            ```

            ### IIS 支持

            IIS 版本已独立为 [sslctl-iis](https://github.com/cnssl/sslctl-iis) 项目，基于 .NET 8，提供 GUI 界面。
          files: dist/*.gz
          draft: false
