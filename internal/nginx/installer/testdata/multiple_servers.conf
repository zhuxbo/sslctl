# First server block - HTTP only
server {
    listen 80;
    server_name first.example.com;
    root /var/www/first;

    location / {
        try_files $uri $uri/ =404;
    }
}

# Second server block - already has SSL
server {
    listen 80;
    listen 443 ssl;
    server_name second.example.com;
    root /var/www/second;

    ssl_certificate /etc/ssl/certs/second.crt;
    ssl_certificate_key /etc/ssl/private/second.key;

    location / {
        try_files $uri $uri/ =404;
    }
}

# Third server block - HTTP only, different port
server {
    listen 8080;
    server_name third.example.com;
    root /var/www/third;

    location / {
        proxy_pass http://backend;
    }
}
